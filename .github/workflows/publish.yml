name: Publish to PyPI

on:
  # Auto-publish to TestPyPI when a version tag is pushed
  push:
    tags:
      - "v*"
  # Manual trigger for TestPyPI or Production PyPI
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: 'Publish to PyPI (production)?'
        required: true
        default: 'false'
        type: boolean

jobs:
  # ============================================
  # Step 1: Run tests before publishing
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ============================================
  # Step 2: Validate tag version matches pyproject.toml
  # ============================================
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "✅ Versions match"

  # ============================================
  # Step 3: Build package
  # ============================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, validate]
    # validate job is skipped on workflow_dispatch, so we need to handle both cases
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.validate.result == 'success' || needs.validate.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============================================
  # Step 4a: Auto-publish to TestPyPI on tag push
  # ============================================
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && !inputs.publish_to_pypi)
    environment:
      name: testpypi
      url: https://test.pypi.org/p/dagloom
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ============================================
  # Step 4b: PyPI Production Publishing (Manual Only)
  # ============================================
  # This job requires manual trigger via workflow_dispatch
  # to prevent accidental releases to production.
  #
  # Recommended workflow:
  # 1. Push a version tag: git tag v0.3.0 && git push origin v0.3.0
  #    → Automatically runs tests + publishes to TestPyPI
  # 2. Verify the package on TestPyPI:
  #    pip install --index-url https://test.pypi.org/simple/ \
  #                --extra-index-url https://pypi.org/simple/ dagloom
  # 3. Go to Actions > "Publish to PyPI" > "Run workflow"
  # 4. Check "Publish to PyPI (production)?" and click "Run workflow"
  # ============================================
  publish-pypi:
    name: Publish to PyPI (Production)
    runs-on: ubuntu-latest
    needs: build
    # Only run when manually triggered with publish_to_pypi=true
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi
    environment:
      name: pypi
      url: https://pypi.org/p/dagloom
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
