name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger
    inputs:
      publish_to_pypi:
        description: 'Publish to PyPI (production)?'
        required: true
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    # Auto publish to TestPyPI on release
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.publish_to_pypi)
    environment:
      name: testpypi
      url: https://test.pypi.org/p/dagloom
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ============================================
  # PyPI Production Publishing (Manual Only)
  # ============================================
  # This job requires manual trigger via workflow_dispatch
  # to prevent accidental releases to production.
  #
  # Steps to publish to PyPI:
  # 1. Create a GitHub Release (auto-publishes to TestPyPI)
  # 2. Verify the package on TestPyPI:
  #    pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ dagloom
  # 3. Go to Actions > "Publish to PyPI" > "Run workflow"
  # 4. Check "Publish to PyPI (production)?" and click "Run workflow"
  # ============================================
  publish-pypi:
    name: Publish to PyPI (Production)
    runs-on: ubuntu-latest
    needs: build
    # Only run when manually triggered with publish_to_pypi=true
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi
    environment:
      name: pypi
      url: https://pypi.org/p/dagloom
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
